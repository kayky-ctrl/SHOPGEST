<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ShopGest - Clientes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav-menu">
        <a href="clientes.html" class="active">Clientes</a>
        <a href="pedidos.html">Pedidos</a>
    </nav>

    <h1>Gestão de Clientes</h1>

    <div class="form-card">
        <h3>Criar Cliente</h3>
        <form id="formCriarCliente">
            <label>Nome
                <input type="text" name="nome" placeholder="Insira seu nome" required>
            </label>
            <label>CPF
                <input type="text" name="cpf" placeholder="Insira seu CPF" required>
            </label>
            <label>Email
                <input type="email" name="email" placeholder="Insira seu email" required>
            </label>
            <label>Número do Cartão
                <input type="text" name="numeroCartao" placeholder="Insira o número do cartão" required>
            </label>
            <button type="submit" class="btn">Criar Cliente</button>
        </form>
    </div>

    <div>
        <h3>Lista de Clientes</h3>
    </div>
    <div id="listaClientes" class="container-cards"></div>

    <script src="script.js"></script>
</body>
</html>
